version: '3.8'

services:
  postgresql:
    image: registry.yygu.cn/library/postgres:17.9
    container_name: leros-postgresql
    environment:
      POSTGRES_DB: leros_db
      POSTGRES_USER: leros_user
      POSTGRES_PASSWORD: leros_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready -U leros_user -d leros_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: registry.yygu.cn/library/nats:2.12.7
    container_name: leros-nats
    command: ["--jetstream"]
    environment: []
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "/nats-server", "--help"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  leros:
    image: localhost/env_leros:latest
    container_name: leros-app
    ports:
      - "8080:8080"
    depends_on:
      postgresql:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://leros_user:leros_password@postgresql:5432/leros_db
      - NATS_URL=nats://nats:4222
      - GIN_MODE=release
      - LEROS_STORAGE_LOCAL_DIR=/app/leros-storage
    volumes:
      - ./config.yaml:/app/config.yaml
      - leros_storage:/app/leros-storage
    command: ["server", "--config", "/app/config.yaml"]
    restart: unless-stopped

  worker:
    image: localhost/env_leros:latest
    container_name: leros-worker
    depends_on:
      postgresql:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://leros_user:leros_password@postgresql:5432/leros_db
      - NATS_URL=nats://nats:4222
      - LEROS_STORAGE_LOCAL_DIR=/app/leros-storage
    volumes:
      - ./config.yaml:/app/config.yaml
      - leros_storage:/app/leros-storage
    command: ["worker", "--config", "/app/config.yaml"]
    restart: unless-stopped

volumes:
  postgres_data:
  nats_data:
  leros_storage: