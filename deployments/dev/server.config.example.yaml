# Leros Development Configuration - Server
env: local
workspace_root:

server:
  port: 8080
  jwt:
    secret: "dev-leros-jwt-secret"

database:
  url: "postgres://leros_dev_user:leros_dev_password@localhost:5433/leros_dev_db?sslmode=disable"
  debug: true

nats:
  url: "nats://localhost:4223/"

log:
  level: debug

llm:
  provider: "openai"
  api_key: "${LLM_API_KEY}"
  model: "qwen3.6-plus"
  base_url: "https://api.yygu.cn/v3/llm.chat/"

gitea:
  endpoint: "http://49.232.218.218:3009"
  admin_token: "<your_admin_token>"
  default_owner: "leros-system"
  org_prefix: "leros"
