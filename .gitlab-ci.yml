spec:
  inputs:
    environment:
      default: test
      options:
        - test
        - prod
        - image
      description: 发布的环境选择，image为仅构建镜像
    app:
      default: leros
      options:
        - leros
        - leros-worker
        - desktop
      description: '选择要发布的应用或模块，desktop为桌面端打包上传COS'
    update_worker_image:
      default: "true"
      options:
        - "true"
        - "false"
      description: '发布 leros server 时是否同步构建 worker 镜像并更新 scheduler.worker_image'
---

stages:
  - test
  - build
  - deploy
  - desktop_build
  - notify

variables:
  PRJ: "insmtx"
  ENV: "$[[ inputs.environment ]]"
  APP: "$[[ inputs.app ]]"
  UPDATE_WORKER_IMAGE: "$[[ inputs.update_worker_image ]]"
  K3S_NAMESPACE_TEST: "insmtx-test"
  K3S_SERVER_DEPLOYMENT: "leros"
  K3S_SERVER_CONTAINER: "leros"
  K3S_SERVER_CONFIGMAP: "leros-server-config"
  K3S_SERVER_CONFIG_KEY: "config.yaml"


uint-test:
  stage: test
  image: registry.cn-beijing.aliyuncs.com/wa/hub:docker_28.5-dind-1
  rules:
    - if: '$APP == "desktop"'
      when: never
    - when: on_success
  script:
    - echo testing
    # - APP=$[[ inputs.app ]] make test

build-image:
  stage: build
  rules:
    - if: '$APP == "desktop"'
      when: never
    - when: on_success
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  image: registry.cn-beijing.aliyuncs.com/wa/hub:docker_28.5-dind-1
  before_script:
    - echo "PIPELINE_STATUS=failed" > build.env
    - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USERNAME" --password-stdin "$HARBOR_HOST"
  script:
    - echo $[[ inputs.app ]] $[[ inputs.environment ]]
    - export APP=$[[ inputs.app ]]
    - export REGISTRY="$HARBOR_HOST"
    - make push-image
    - echo "PIPELINE_STATUS=success" > build.env
    - export IMAGE_TAG=$(make image-tag)
    - echo "IMAGE_TAG=${IMAGE_TAG}" >> build.env
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env

build-worker-image:
  stage: build
  rules:
    - if: '$APP == "desktop"'
      when: never
    - if: '$APP == "leros" && $UPDATE_WORKER_IMAGE == "true"'
      when: on_success
    - when: never
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    APP: leros-worker
  image: registry.cn-beijing.aliyuncs.com/wa/hub:docker_28.5-dind-1
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USERNAME" --password-stdin "$HARBOR_HOST"
  script:
    - export REGISTRY="$HARBOR_HOST"
    - make push-image
    - export WORKER_IMAGE_TAG=$(make image-tag)
    - echo "WORKER_IMAGE_TAG=${WORKER_IMAGE_TAG}" > worker.env
    - echo "WORKER_IMAGE=${HARBOR_HOST}/${PRJ}/leros-worker:${WORKER_IMAGE_TAG}" >> worker.env
    - cat worker.env
  artifacts:
    reports:
      dotenv: worker.env

deploy:
  stage: deploy
  image: registry.ap-southeast-1.aliyuncs.com/wa/openrpa:gitlab_cd-2
  rules:
    - if: '$APP == "desktop"'
      when: never
    - if: '$ENV != "image"'
      when: on_success
    - when: never
  before_script:
    - echo "PIPELINE_STATUS=failed" > deploy.env
    - echo "Deploying $app to $environment environment"
    - mkdir -p ~/.ssh
    - |
      if [ "${ENV}" = "test" ]; then
          if [ -z "$DEPLOY_HOST_TEST" ]; then
            echo "Required deploy variable is missing: DEPLOY_HOST_TEST"
            exit 1
          fi
          DEPLOY_HOST="$DEPLOY_HOST_TEST"
          echo "$SSH_KEY_T29" | base64 -d > ~/.ssh/id_rsa
          UPDATE_SCRIPT="./update_yygu.sh"
          K3S_NAMESPACE="${K3S_NAMESPACE_TEST:-insmtx-test}"
      elif [ "${ENV}" = "prod" ]; then
          if [ -z "$DEPLOY_HOST_PROD" ]; then
            echo "Required deploy variable is missing: DEPLOY_HOST_PROD"
            exit 1
          fi
          if [ -z "$K3S_NAMESPACE_PROD" ]; then
            echo "Required deploy variable is missing: K3S_NAMESPACE_PROD"
            exit 1
          fi
          DEPLOY_HOST="$DEPLOY_HOST_PROD"
          echo "$SSH_KEY_P31" | base64 -d > ~/.ssh/id_rsa
          UPDATE_SCRIPT="./update_yygu.sh"
          K3S_NAMESPACE="$K3S_NAMESPACE_PROD"
      else
          echo "Unknown ENV: $ENV"
          exit 1
      fi
      export DEPLOY_HOST UPDATE_SCRIPT K3S_NAMESPACE
    - chmod 600 ~/.ssh/id_rsa
  script:
    # - echo "IMAGE_TAG=$IMAGE_TAG"
    - echo "${PRJ} ${APP} ${IMAGE_TAG} "
    - |
      if [ "${APP}" = "leros" ] && [ "${UPDATE_WORKER_IMAGE}" = "true" ]; then
        if [ -z "${WORKER_IMAGE:-}" ]; then
          echo "UPDATE_WORKER_IMAGE=true but WORKER_IMAGE is empty. Check that build-worker-image ran successfully and exported worker.env."
          echo "PIPELINE_STATUS=failed" > deploy.env
          exit 1
        fi

        SERVER_IMAGE="${HARBOR_HOST}/${PRJ}/${APP}:${IMAGE_TAG}"
        scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no deployments/k3s/update-leros-images.sh "$DEPLOY_HOST:/tmp/update-leros-images.sh"
        if ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "$DEPLOY_HOST" \
          "K3S_NAMESPACE='${K3S_NAMESPACE}' K3S_SERVER_DEPLOYMENT='${K3S_SERVER_DEPLOYMENT}' K3S_SERVER_CONTAINER='${K3S_SERVER_CONTAINER}' K3S_SERVER_CONFIGMAP='${K3S_SERVER_CONFIGMAP}' K3S_SERVER_CONFIG_KEY='${K3S_SERVER_CONFIG_KEY}' bash /tmp/update-leros-images.sh '${SERVER_IMAGE}' '${WORKER_IMAGE}'"; then
          echo "PIPELINE_STATUS=success" > deploy.env
        else
          echo "PIPELINE_STATUS=failed" > deploy.env
        fi
      elif ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $DEPLOY_HOST "$UPDATE_SCRIPT ${PRJ} ${APP} ${IMAGE_TAG} "; then
        echo "PIPELINE_STATUS=success" > deploy.env
      else
        echo "PIPELINE_STATUS=failed" > deploy.env
      fi
    - cat deploy.env
    - echo "${PIPELINE_STATUS}"
  needs:
    - job: build-image
      artifacts: true
    - job: build-worker-image
      artifacts: true
      optional: true
  artifacts:
    reports:
      dotenv: deploy.env

.desktop-build-template:
  stage: desktop_build
  tags:
    - macos
  rules:
    - if: '$APP == "desktop"'
      when: on_success
    - when: never
  variables:
    ELECTRON_CACHE: "$CI_PROJECT_DIR/.electron-cache"
    electron_config_cache: "$CI_PROJECT_DIR/.electron-cache"
    ELECTRON_BUILDER_CACHE: "$CI_PROJECT_DIR/.electron-builder-cache"
    ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"
    ELECTRON_BUILDER_BINARIES_MIRROR: "https://npmmirror.com/mirrors/electron-builder-binaries/"
    npm_config_electron_mirror: "https://npmmirror.com/mirrors/electron/"
    npm_config_electron_builder_binaries_mirror: "https://npmmirror.com/mirrors/electron-builder-binaries/"
    COREPACK_NPM_REGISTRY: "https://registry.npmmirror.com"
    npm_config_registry: "https://registry.npmmirror.com"
  before_script:
    - mkdir -p "$CI_PROJECT_DIR/.corepack-bin" "$CI_PROJECT_DIR/.corepack-home"
    - export PATH="/opt/homebrew/bin:/usr/local/bin:$CI_PROJECT_DIR/.corepack-bin:$PATH"
    - |
      if ! command -v node >/dev/null 2>&1; then
        echo "Node.js is required on the macOS runner. Install Node 22 and make sure /opt/homebrew/bin or /usr/local/bin is visible to gitlab-runner."
        exit 1
      fi
    - node --version
    - export COREPACK_HOME="$CI_PROJECT_DIR/.corepack-home"
    - |
      retry_before_script() {
        local attempt=1
        local max_attempts=5

        until "$@"; do
          if [ "$attempt" -ge "$max_attempts" ]; then
            return 1
          fi

          echo "Command failed, retrying (${attempt}/${max_attempts}): $*"
          attempt=$((attempt + 1))
          sleep 15
        done
      }
    - corepack enable --install-directory "$CI_PROJECT_DIR/.corepack-bin"
    - retry_before_script corepack prepare pnpm@10.28.2 --activate
    - |
      for variable in VITE_LEROS_API_BASE_URL COS_SECRET_ID COS_SECRET_KEY COS_BUCKET COS_REGION DESKTOP_COS_ROOT_PREFIX DESKTOP_COS_PREFIX DESKTOP_TARGET; do
        if [ -z "$(eval echo \$$variable)" ]; then
          echo "Required desktop variable is missing: ${variable}"
          exit 1
        fi
      done
    - |
      if [ "$DESKTOP_TARGET" = "mac-arm64" ] || [ "$DESKTOP_TARGET" = "mac-x64" ]; then
        for variable in APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD; do
          if [ -z "$(eval echo \$$variable)" ]; then
            echo "Required mac desktop variable is missing: ${variable}"
            exit 1
          fi
        done

        printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$CI_PROJECT_DIR/AuthKey.p8"
        printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CI_PROJECT_DIR/macos-certificate.p12"
        chmod 600 "$CI_PROJECT_DIR/AuthKey.p8"
        chmod 600 "$CI_PROJECT_DIR/macos-certificate.p12"

        security create-keychain -p "$MACOS_CERTIFICATE_PASSWORD" "$CI_PROJECT_DIR/macos-signing.keychain-db"
        security set-keychain-settings -lut 21600 "$CI_PROJECT_DIR/macos-signing.keychain-db"
        security unlock-keychain -p "$MACOS_CERTIFICATE_PASSWORD" "$CI_PROJECT_DIR/macos-signing.keychain-db"
        security import "$CI_PROJECT_DIR/macos-certificate.p12" -k "$CI_PROJECT_DIR/macos-signing.keychain-db" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CERTIFICATE_PASSWORD" "$CI_PROJECT_DIR/macos-signing.keychain-db"
        security list-keychains -d user -s "$CI_PROJECT_DIR/macos-signing.keychain-db"
        export MACOS_CODESIGN_IDENTITY="${MACOS_CODESIGN_IDENTITY:-Developer ID Application: Chuanjian Wang (Z6V3M72YA5)}"
        security find-identity -v -p codesigning "$CI_PROJECT_DIR/macos-signing.keychain-db"
        if ! security find-identity -v -p codesigning "$CI_PROJECT_DIR/macos-signing.keychain-db" | grep -F "$MACOS_CODESIGN_IDENTITY"; then
          echo "Required macOS codesign identity is missing: $MACOS_CODESIGN_IDENTITY"
          exit 1
        fi
        export MACOS_CSC_NAME="$(security find-identity -v -p codesigning "$CI_PROJECT_DIR/macos-signing.keychain-db" | awk -v identity="$MACOS_CODESIGN_IDENTITY" 'index($0, identity) { print $2; exit }')"
        if [ -z "$MACOS_CSC_NAME" ]; then
          echo "Failed to resolve macOS codesign identity hash: $MACOS_CODESIGN_IDENTITY"
          exit 1
        fi
      fi
    - python3 -m venv "$CI_PROJECT_DIR/.coscmd-venv"
    - $CI_PROJECT_DIR/.coscmd-venv/bin/pip install coscmd
  script:
    - mkdir -p "$CI_PROJECT_DIR/.ci-home"
    - export PATH="/opt/homebrew/bin:/usr/local/bin:$CI_PROJECT_DIR/.corepack-bin:$CI_PROJECT_DIR/.coscmd-venv/bin:$PATH"
    - |
      retry() {
        local attempt=1
        local max_attempts="${RETRY_MAX_ATTEMPTS:-3}"

        until "$@"; do
          if [ "$attempt" -ge "$max_attempts" ]; then
            return 1
          fi

          echo "Command failed, retrying (${attempt}/${max_attempts}): $*"
          attempt=$((attempt + 1))
          sleep 15
        done
      }
    - export DESKTOP_VERSION="${CI_COMMIT_TAG#v}"
    - |
      if [ -z "$DESKTOP_VERSION" ]; then
        DESKTOP_VERSION="$(node -p 'require("./frontend/apps/desktop/package.json").version')"
      fi
    - |
      if [ -z "$DESKTOP_VERSION" ]; then
        echo "desktop package version is required"
        exit 1
      fi
    - cd frontend
    - pnpm install --frozen-lockfile
    - cd apps/desktop
    - node -e 'const fs = require("node:fs"); const version = process.argv[1]; const path = "package.json"; const pkg = JSON.parse(fs.readFileSync(path, "utf8")); pkg.version = version; fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);' "$DESKTOP_VERSION"
    - cd ../..
    - pnpm --filter @leros/desktop typecheck
    - HOME="$CI_PROJECT_DIR/.ci-home" coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" -b "$COS_BUCKET" -r "$COS_REGION"
    - |
      version="$DESKTOP_VERSION"
      root_prefix="${DESKTOP_COS_ROOT_PREFIX#/}"
      root_prefix="${root_prefix%/}"
      prefix="${DESKTOP_COS_PREFIX#/}"
      prefix="${prefix%/}"
      printf '%s\n' "$version" > "$CI_PROJECT_DIR/LATEST.txt"

      upload_dir() {
        local local_dir="$1"
        local target_dir="$2"

        if [ ! -d "$local_dir" ]; then
          echo "Missing desktop payload directory: $local_dir"
          exit 1
        fi

        find "$local_dir" -maxdepth 1 -type f -print0 | while IFS= read -r -d '' file_path; do
          object_key="${prefix}/${target_dir}/$(basename "$file_path")"
          HOME="$CI_PROJECT_DIR/.ci-home" coscmd upload "$file_path" "$object_key"
        done
      }

      upload_file() {
        local file_path="$1"
        local target_dir="$2"

        if [ ! -f "$file_path" ]; then
          echo "Missing desktop payload file: $file_path"
          exit 1
        fi

        HOME="$CI_PROJECT_DIR/.ci-home" coscmd upload "$file_path" "${target_dir}/$(basename "$file_path")"
      }

      case "$DESKTOP_TARGET" in
        mac-arm64)
          build_script="dist:desktop:mac:arm64"
          release_dir="desktop-release/mac-arm64"
          cos_target_dir="darwin/arm64"
          latest_file="latest-mac.yml"
          root_installer="Lework-${version}-mac-arm64.dmg"
          build_with_signing="true"
          payload_files="
            Lework-${version}-mac-arm64.dmg
            Lework-${version}-mac-arm64.zip
            Lework-${version}-mac-arm64.dmg.blockmap
            Lework-${version}-mac-arm64.zip.blockmap
          "
          ;;
        mac-x64)
          build_script="dist:desktop:mac:x64"
          release_dir="desktop-release/mac-x64"
          cos_target_dir="darwin/x64"
          latest_file="latest-mac.yml"
          root_installer="Lework-${version}-mac-x64.dmg"
          build_with_signing="true"
          payload_files="
            Lework-${version}-mac-x64.dmg
            Lework-${version}-mac-x64.zip
            Lework-${version}-mac-x64.dmg.blockmap
            Lework-${version}-mac-x64.zip.blockmap
          "
          ;;
        win-x64)
          build_script="dist:desktop:win:x64"
          release_dir="desktop-release/win-x64"
          cos_target_dir="win32/x64"
          latest_file="latest.yml"
          root_installer="Lework-${version}-win-x64.exe"
          build_with_signing="false"
          payload_files="
            Lework-${version}-win-x64.exe
            Lework-${version}-win-x64.exe.blockmap
          "
          ;;
        *)
          echo "Unsupported DESKTOP_TARGET: $DESKTOP_TARGET"
          exit 1
          ;;
      esac

      cd "$CI_PROJECT_DIR/frontend"
      if [ "$build_with_signing" = "true" ]; then
        security unlock-keychain -p "$MACOS_CERTIFICATE_PASSWORD" "$CI_PROJECT_DIR/macos-signing.keychain-db"
        security find-identity -v -p codesigning "$CI_PROJECT_DIR/macos-signing.keychain-db"
        env APPLE_API_KEY="$CI_PROJECT_DIR/AuthKey.p8" CSC_KEYCHAIN="$CI_PROJECT_DIR/macos-signing.keychain-db" CSC_NAME="$MACOS_CSC_NAME" pnpm run "$build_script"
      else
        RETRY_MAX_ATTEMPTS=6 retry env ELECTRON_MIRROR="$ELECTRON_MIRROR" ELECTRON_BUILDER_BINARIES_MIRROR="$ELECTRON_BUILDER_BINARIES_MIRROR" npm_config_electron_mirror="$npm_config_electron_mirror" npm_config_electron_builder_binaries_mirror="$npm_config_electron_builder_binaries_mirror" pnpm run "$build_script"
      fi

      cd "$CI_PROJECT_DIR"
      mkdir -p "$release_dir"
      for payload_file in $payload_files; do
        cp "frontend/apps/desktop/dist/${payload_file}" "$release_dir/"
      done
      cp "frontend/apps/desktop/dist/${latest_file}" "$release_dir/"

      upload_dir "$release_dir" "$cos_target_dir"
      upload_file "${release_dir}/${root_installer}" "$root_prefix"
      upload_file "LATEST.txt" "$root_prefix"

desktop-build-mac-arm64:
  extends: .desktop-build-template
  variables:
    DESKTOP_TARGET: mac-arm64

desktop-build-mac-x64:
  extends: .desktop-build-template
  variables:
    DESKTOP_TARGET: mac-x64

desktop-build-win-x64:
  extends: .desktop-build-template
  variables:
    DESKTOP_TARGET: win-x64

notify:
  stage: notify
  image: registry.ap-southeast-1.aliyuncs.com/wa/openrpa:curl_8.12.1
  dependencies:
    - build-image
  rules:
    - if: '$APP == "desktop"'
      when: never
    - when: always
  script:
    - |
      if [ -z "$WEWORK_WEBHOOK_KEY" ]; then
        echo "Required notify variable is missing: WEWORK_WEBHOOK_KEY"
        exit 1
      fi
    - echo "${PIPELINE_STATUS}"
    - |
      if [ "${PIPELINE_STATUS}" = "success" ]; then
        MSG="【${ENV}环境】服务组件${PRJ}/${APP}:${IMAGE_TAG} 更新成功"
      else
        MSG="【${ENV}环境】服务组件${PRJ}/${APP}:${IMAGE_TAG} 更新失败"
      fi
      curl -H "Content-Type: application/json;charset=utf-8" \
        -d "{\"msgtype\": \"text\",\"text\": {\"content\":\"${MSG}\"}}" \
        "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WEWORK_WEBHOOK_KEY}"

workflow:
  rules:
    - if: $CI_COMMIT_TAG
      when: always
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
    - if: $CI_PIPELINE_SOURCE == "api"
      when: always
    - when: never
