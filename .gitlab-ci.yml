desktop-publish-cos:
  stage: desktop_publish
  image: registry.ap-southeast-1.aliyuncs.com/wa/openrpa:gitlab_cd-2
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - if: '$ENV == "desktop"'
      when: on_success
    - when: never
  needs:
    - job: desktop-build-mac-arm64
      artifacts: true
    - job: desktop-build-mac-x64
      artifacts: true
    - job: desktop-build-win-x64
      artifacts: true
  before_script:
    - python3 -m pip install --user coscmd
  script:
    - |
      for variable in COS_SECRET_ID COS_SECRET_KEY COS_BUCKET COS_REGION DESKTOP_COS_ROOT_PREFIX DESKTOP_COS_PREFIX; do
        if [ -z "$(eval echo \$$variable)" ]; then
          echo "Required COS variable is missing: ${variable}"
          exit 1
        fi
      done
    - export PATH="$HOME/.local/bin:$PATH"
    - coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" -b "$COS_BUCKET" -r "$COS_REGION"
    - |
      version="${CI_COMMIT_TAG#v}"
      if [ -z "$version" ]; then
        version="$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' frontend/apps/desktop/package.json | head -n 1)"
      fi
      root_prefix="${DESKTOP_COS_ROOT_PREFIX#/}"
      root_prefix="${root_prefix%/}"
      prefix="${DESKTOP_COS_PREFIX#/}"
      prefix="${prefix%/}"
      printf '%s\n' "$version" > LATEST.txt

      upload_dir() {
        local local_dir="$1"
        local target_dir="$2"

        if [ ! -d "$local_dir" ]; then
          echo "Missing desktop payload directory: $local_dir"
          exit 1
        fi

        find "$local_dir" -maxdepth 1 -type f -print0 | while IFS= read -r -d '' file_path; do
          object_key="${prefix}/${target_dir}/$(basename "$file_path")"
          coscmd upload "$file_path" "$object_key"
        done
      }

      upload_file() {
        local file_path="$1"
        local target_dir="$2"

        if [ ! -f "$file_path" ]; then
          echo "Missing desktop payload file: $file_path"
          exit 1
        fi

        coscmd upload "$file_path" "${target_dir}/$(basename "$file_path")"
      }

      upload_dir "desktop-release/mac-arm64" "darwin/arm64"
      upload_dir "desktop-release/mac-x64" "darwin/x64"
      upload_dir "desktop-release/win-x64" "win32/x64"
      upload_file "desktop-release/mac-arm64/Lework-${version}-mac-arm64.dmg" "$root_prefix"
      upload_file "desktop-release/mac-x64/Lework-${version}-mac-x64.dmg" "$root_prefix"
      upload_file "desktop-release/win-x64/Lework-${version}-win-x64.exe" "$root_prefix"
      upload_file "LATEST.txt" "$root_prefix"

notify:
  stage: notify
  image: registry.ap-southeast-1.aliyuncs.com/wa/openrpa:curl_8.12.1
  dependencies:
    - build-image
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$ENV == "desktop"'
      when: never
    - when: always
  script:
    - |
      if [ -z "$WEWORK_WEBHOOK_KEY" ]; then
        echo "Required notify variable is missing: WEWORK_WEBHOOK_KEY"
        exit 1
      fi
    - echo "${PIPELINE_STATUS}"
    - |
      if [ "${PIPELINE_STATUS}" = "success" ]; then
        MSG="【${ENV}环境】服务组件${PRJ}/${APP}:${IMAGE_TAG} 更新成功"
      else
        MSG="【${ENV}环境】服务组件${PRJ}/${APP}:${IMAGE_TAG} 更新失败"
      fi
      curl -H "Content-Type: application/json;charset=utf-8" \
        -d "{\"msgtype\": \"text\",\"text\": {\"content\":\"${MSG}\"}}" \
        "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WEWORK_WEBHOOK_KEY}"

workflow:
  rules:
    - if: $CI_COMMIT_TAG
      when: always
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
    - if: $CI_PIPELINE_SOURCE == "api"
      when: always
    - when: never
