spec:
  inputs:
    environment:
      default: test
      options:
        - test
        - prod
        - image
        - desktop
      description: 发布的环境选择，image为仅构建镜像，desktop为桌面端打包上传COS
    app:
      default: leros
      options:
        - leros
      description: '选择要发布的应用或模块'
---

stages:
  - test
  - build
  - deploy
  - desktop_build
  - desktop_publish
  - notify

variables:
  PRJ: "insmtx"
  ENV: "$[[ inputs.environment ]]"
  APP: "$[[ inputs.app ]]"


uint-test:
  stage: test
  image: registry.cn-beijing.aliyuncs.com/wa/hub:docker_28.5-dind-1
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$ENV == "desktop"'
      when: never
    - when: on_success
  script:
    - echo testing
    # - APP=$[[ inputs.app ]] make test

build-image:
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$ENV == "desktop"'
      when: never
    - when: on_success
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  image: registry.cn-beijing.aliyuncs.com/wa/hub:docker_28.5-dind-1
  before_script:
    - echo "PIPELINE_STATUS=failed" > build.env
    - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USERNAME" --password-stdin "$HARBOR_HOST"
  script:
    - echo $[[ inputs.app ]] $[[ inputs.environment ]]
    - export APP=$[[ inputs.app ]]
    - make push-image
    - echo "PIPELINE_STATUS=success" > build.env
    - export IMAGE_TAG=$(make image-tag)
    - echo "IMAGE_TAG=${IMAGE_TAG}" >> build.env
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env

deploy:
  stage: deploy
  image: registry.ap-southeast-1.aliyuncs.com/wa/openrpa:gitlab_cd-2
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$ENV == "desktop"'
      when: never
    - if: '$ENV != "image"'
      when: on_success
    - when: never
  before_script:
    - echo "PIPELINE_STATUS=failed" > deploy.env
    - echo "Deploying $app to $environment environment"
    - mkdir -p ~/.ssh
    - |
      if [ "${ENV}" = "test" ]; then
          if [ -z "$DEPLOY_HOST_TEST" ]; then
            echo "Required deploy variable is missing: DEPLOY_HOST_TEST"
            exit 1
          fi
          DEPLOY_HOST="$DEPLOY_HOST_TEST"
          echo "$SSH_KEY_T29" | base64 -d > ~/.ssh/id_rsa
          UPDATE_SCRIPT="./update_yygu.sh"
      elif [ "${ENV}" = "prod" ]; then
          if [ -z "$DEPLOY_HOST_PROD" ]; then
            echo "Required deploy variable is missing: DEPLOY_HOST_PROD"
            exit 1
          fi
          DEPLOY_HOST="$DEPLOY_HOST_PROD"
          echo "$SSH_KEY_P31" | base64 -d > ~/.ssh/id_rsa
          UPDATE_SCRIPT="./update_yygu.sh"
      else
          echo "Unknown ENV: $ENV"
          exit 1
      fi
    - chmod 600 ~/.ssh/id_rsa
  script:
    # - echo "IMAGE_TAG=$IMAGE_TAG"
    - echo "${PRJ} ${APP} ${IMAGE_TAG} "
    - |
      if ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $DEPLOY_HOST "$UPDATE_SCRIPT ${PRJ} ${APP} ${IMAGE_TAG} "; then
        echo "PIPELINE_STATUS=success" > deploy.env
      else
        echo "PIPELINE_STATUS=failed" > deploy.env
      fi
    - cat deploy.env
    - echo "${PIPELINE_STATUS}"
  needs:
    - build-image
  artifacts:
    reports:
      dotenv: deploy.env

desktop-build-mac-arm64:
  stage: desktop_build
  tags:
    - macos
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - if: '$ENV == "desktop"'
      when: on_success
    - when: never
  variables:
    ELECTRON_CACHE: "$CI_PROJECT_DIR/.electron-cache"
    electron_config_cache: "$CI_PROJECT_DIR/.electron-cache"
    ELECTRON_BUILDER_CACHE: "$CI_PROJECT_DIR/.electron-builder-cache"
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.28.2 --activate
    - |
      for variable in VITE_LEROS_API_BASE_URL APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD; do
        if [ -z "$(eval echo \$$variable)" ]; then
          echo "Required desktop build variable is missing: ${variable}"
          exit 1
        fi
      done
    - printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$CI_PROJECT_DIR/AuthKey.p8"
    - chmod 600 "$CI_PROJECT_DIR/AuthKey.p8"
  script:
    - export DESKTOP_VERSION="${CI_COMMIT_TAG#v}"
    - |
      if [ -z "$DESKTOP_VERSION" ]; then
        DESKTOP_VERSION="$(node -p 'require("./frontend/apps/desktop/package.json").version')"
      fi
    - |
      if [ -z "$DESKTOP_VERSION" ]; then
        echo "desktop package version is required"
        exit 1
      fi
    - cd frontend
    - pnpm install --frozen-lockfile
    - cd apps/desktop
    - node -e 'const fs = require("node:fs"); const version = process.argv[1]; const path = "package.json"; const pkg = JSON.parse(fs.readFileSync(path, "utf8")); pkg.version = version; fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);' "$DESKTOP_VERSION"
    - cd ../..
    - pnpm --filter @leros/desktop typecheck
    - APPLE_API_KEY="$CI_PROJECT_DIR/AuthKey.p8" CSC_LINK="$MACOS_CERTIFICATE_P12_BASE64" CSC_KEY_PASSWORD="$MACOS_CERTIFICATE_PASSWORD" pnpm run dist:desktop:mac:arm64
    - cd "$CI_PROJECT_DIR"
    - mkdir -p desktop-release/mac-arm64
    - cp frontend/apps/desktop/dist/*.dmg desktop-release/mac-arm64/
    - cp frontend/apps/desktop/dist/*.zip desktop-release/mac-arm64/
    - cp frontend/apps/desktop/dist/*.blockmap desktop-release/mac-arm64/
    - cp frontend/apps/desktop/dist/latest-mac.yml desktop-release/mac-arm64/
  artifacts:
    expire_in: 7 days
    paths:
      - desktop-release/mac-arm64/

